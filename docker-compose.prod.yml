services:
  db:
    image: postgres:16-alpine
    container_name: memorycard-db
    environment:
      POSTGRES_DB: memorycard
      POSTGRES_USER: memorycard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - memorycard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memorycard -d memorycard"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    container_name: memorycard-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/memorycard
      SPRING_DATASOURCE_USERNAME: memorycard
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      STORAGE_PATH: /data/uploads
    volumes:
      - memorycard_uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: memorycard-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_AGREE: "true"
      EMAIL: ${ACME_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  memorycard_pgdata:
  memorycard_uploads:
  caddy_data:
  caddy_config:
