<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas | MemoryCard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="container nav-content">
        <a th:href="@{/dashboard}" class="logo">MemoryCard</a>
        <div class="nav-links">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/games}">Meus Jogos</a>
            <a th:href="@{/lists}" class="active">Listas</a>
            <a th:href="@{/profile}">Perfil</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="btn btn-ghost btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>

<main class="container">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <header class="page-header">
        <h1>Minhas listas</h1>
    </header>

    <section class="card">
        <h2>Nova lista</h2>
        <form th:action="@{/lists}" method="post" class="list-create-form">
            <input type="text" name="name" required placeholder="Ex: JRPGs dos 90, Retro SNES...">
            <input type="text" name="description" placeholder="Descrição opcional">
            <button type="submit" class="btn btn-primary btn-sm">Criar lista</button>
        </form>
    </section>

    <div th:if="${#lists.isEmpty(lists)}" class="empty-state card">
        <p>Nenhuma lista criada. Crie coleções como "Zerados no emulador" ou "Fila de jogos".</p>
    </div>

    <div class="lists-grid" th:unless="${#lists.isEmpty(lists)}">
        <a th:each="list : ${lists}" th:href="@{/lists/{id}(id=${list.id})}" class="list-card card">
            <h3 th:text="${list.name()}">Lista</h3>
            <p th:if="${list.description()}" class="meta" th:text="${list.description()}">Descrição</p>
            <span class="badge" th:text="${list.gameCount()} + ' jogos'">0 jogos</span>
        </a>
    </div>
</main>
</body>
</html>
