<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Meus Jogos')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav('games')}"></nav>

<main class="container">
    <header class="page-header">
        <h1>Meus Jogos</h1>
        <a th:href="@{/games/new}" class="btn btn-primary">+ Novo Jogo</a>
    </header>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div th:if="${#lists.isEmpty(games)}" class="empty-state card">
        <h2>Nenhum jogo cadastrado</h2>
        <p>Comece registrando o primeiro jogo da sua biblioteca pessoal.</p>
        <a th:href="@{/games/new}" class="btn btn-primary">Adicionar jogo</a>
    </div>

    <div class="games-grid" th:unless="${#lists.isEmpty(games)}">
        <article th:each="game : ${games}" class="game-card">
            <a th:href="@{/games/{id}(id=${game.id})}" class="game-card-link">
                <img th:if="${game.coverUrl}" th:src="${game.coverUrl}" alt="Capa" class="game-cover">
                <div th:unless="${game.coverUrl}" class="game-cover placeholder">🎮</div>
                <div class="game-card-body">
                    <h3 th:text="${game.title}">Título</h3>
                    <span class="badge" th:text="${game.status.getLabel()}">Jogando</span>
                    <p class="meta" th:text="${game.platform} ?: 'Sem plataforma'">Plataforma</p>
                    <p class="meta" th:if="${game.hoursPlayed}">
                        <span th:text="${game.hoursPlayed}">0</span>h jogadas
                    </p>
                </div>
            </a>
            <div class="game-card-actions">
                <a th:href="@{/games/{id}/edit(id=${game.id})}" class="btn btn-ghost btn-sm">Editar</a>
            </div>
        </article>
    </div>
</main>

<div th:replace="~{fragments/fab :: fab}"></div>
</body>
</html>
