<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body class="auth-page">
<div class="auth-card">
    <a th:href="@{/}" class="auth-brand">
        <img th:src="@{/img/logo-mark.svg}" alt="MemoryCard">
        <span class="auth-brand-title"><span class="logo-memory">Memory</span><span class="logo-card">Card</span></span>
    </a>
    <p class="subtitle">Entre na sua conta</p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/login}" th:object="${loginRequest}" method="post">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" required>
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" th:field="*{password}" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
    </form>

    <p class="auth-footer">Não tem conta? <a th:href="@{/register}">Cadastre-se</a></p>
</div>
</body>
</html>
