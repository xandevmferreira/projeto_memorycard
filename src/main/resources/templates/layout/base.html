<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1117">
    <meta name="description" content="MemoryCard — seu catálogo pessoal de jogos">
    <title th:text="${pageTitle != null ? pageTitle + ' | MemoryCard' : 'MemoryCard'}">MemoryCard</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}">
    <link rel="apple-touch-icon" th:href="@{/img/apple-touch-icon.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar" th:if="${showNav != false}">
    <div class="container nav-content">
        <a th:href="@{/dashboard}" class="logo brand">
            <img th:src="@{/img/logo-mark.svg}" alt="" class="logo-icon" width="36" height="36">
            <span class="logo-text"><span class="logo-memory">Memory</span><span class="logo-card">Card</span></span>
        </a>
        <div class="nav-links">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/games}">Meus Jogos</a>
            <a th:href="@{/lists}">Listas</a>
            <a th:href="@{/friends}">Amigos</a>
            <a th:href="@{/profile}">Perfil</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="btn btn-ghost btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>

<main class="container" th:classappend="${mainClass}">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div layout:fragment="content"></div>
</main>

<footer class="footer" th:if="${showNav != false}">
    <div class="container">
        <p>MemoryCard — seu catálogo pessoal de jogos</p>
    </div>
</footer>
</body>
</html>
